  const builderChangeEvents = [
    'afterAddRule.queryBuilder', 'afterDeleteRule.queryBuilder',
    'afterUpdateRuleFilter.queryBuilder', 'afterUpdateRuleOperator.queryBuilder',
    'afterUpdateRuleValue.queryBuilder', 'afterAddGroup.queryBuilder',
    'afterDeleteGroup.queryBuilder'
  ];

  function getCsrfToken() {
    const tag = document.querySelector('meta[name="csrf-token"]');
    return tag ? tag.getAttribute('content') : '';
  }

  function createApi(root, options) {
    const settings = Object.assign({
      onSave: null,
      onPreview: null
    }, options || {});

    const $root = $(root);
    const $builder = $root.find('[data-role="builder"]');
    const $previewButton = $root.find('[data-role="preview-btn"]');
    const $output = $root.find('[data-role="output"]');
    const $saveButton = $root.find('[data-role="save-btn"]');
    const $nameInput = $root.find('[data-role="name-input"]');
    const $results = $root.find('[data-role="results"]');
    let previewSuccess = false;

    function resetPreview(message) {
      previewSuccess = false;
      $saveButton.prop('disabled', true).attr('title', 'Run Generate SQL first');
      if (typeof message === 'string') {
        $results.text(message);
      }
    }

    function resetState() {
      $output.text('');
      $nameInput.val('');
      $results.text('');
      resetPreview();
      try {
        $builder.queryBuilder('destroy');
      } catch (error) {
      }
      $builder.empty();
      $builder.queryBuilder({
        plugins: ['bt-tooltip-errors'],
        filters: filters
      });
    }

    function getRules() {
      return $builder.queryBuilder('getRules');
    }

    $builder.queryBuilder({
      plugins: ['bt-tooltip-errors'],
      filters: filters
    });

    $builder.on(builderChangeEvents.join(' '), function () {
      resetPreview();
    });

    $previewButton.on('click', function () {
      try {
        const result = $builder.queryBuilder('getSQL', false, false);
        const rules = getRules();
        const displaySQL = (result.sql || 'No query generated').replace(/featuretable\.|classification\./g, '');
        $output.text(displaySQL);

        if (!rules || !Array.isArray(rules.rules) || rules.rules.length === 0) {
          resetPreview('Please add at least one valid rule.');
          return;
        }

        $.ajax({
          url: '/api/preview-query',
          type: 'POST',
          data: JSON.stringify({ rules: rules }),
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrfToken()
          },
          contentType: 'application/json; charset=utf-8',
          dataType: 'json',
          success: function (response) {
            if (response.sql) {
              $results.text('Query is valid. Filter: ' + response.sql);
              previewSuccess = true;
              $saveButton.prop('disabled', false).attr('title', 'Save this query as a watchlist');
              if (typeof settings.onPreview === 'function') {
                settings.onPreview(response, rules);
              }
              return;
            }

            resetPreview('Could not validate query.');
          },
          error: function (xhr, status, error) {
            const resp = xhr.responseJSON;
            resetPreview('Query error: ' + ((resp && resp.error) || error));
          }
        });
      } catch (error) {
        $output.text('Error: ' + error.message);
      }
    });

    $saveButton.on('click', function () {
      if (!previewSuccess) {
        return;
      }

      const name = ($nameInput.val() || '').trim();
      if (!name) {
        $results.text('Please enter a watchlist name before saving.');
        $nameInput.trigger('focus');
        return;
      }

      try {
        const rules = getRules();
        if (!rules || !Array.isArray(rules.rules) || rules.rules.length === 0) {
          $results.text('Please add at least one valid rule.');
          return;
        }

        $saveButton.prop('disabled', true);
        $.ajax({
          url: '/api/watchlist',
          type: 'POST',
          data: JSON.stringify({ name: name, rules: rules }),
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrfToken()
          },
          contentType: 'application/json; charset=utf-8',
          dataType: 'json',
          success: function (response) {
            $results.text('Watchlist "' + response.name + '" saved (id=' + response.id + ').');
            $saveButton.prop('disabled', false).attr('title', 'Save this query as a watchlist');
            if (typeof settings.onSave === 'function') {
              settings.onSave(response, { reset: resetState, root: root });
              return;
            }
            $nameInput.val('');
          },
          error: function (xhr, status, error) {
            const resp = xhr.responseJSON;
            $results.text('Save error: ' + ((resp && resp.error) || error));
            $saveButton.prop('disabled', false).attr('title', 'Save this query as a watchlist');
          }
        });
      } catch (error) {
        $results.text('Error: ' + error.message);
        $saveButton.prop('disabled', false).attr('title', 'Save this query as a watchlist');
      }
    });

    return {
      root: root,
      reset: resetState,
      destroy: function () {
        try {
          $builder.off(builderChangeEvents.join(' '));
          $previewButton.off('click');
          $saveButton.off('click');
          $builder.queryBuilder('destroy');
        } catch (error) {
        }
        $builder.empty();
        root.__watchlistQueryBuilder = null;
      },
      getRules: getRules,
      setMessage: function (message) {
        $results.text(message || '');
      }
    };
  }

  window.PoiWatchlistQueryBuilder = {
    init: function (root, options) {
      if (!root) {
        return null;
      }
      if (root.__watchlistQueryBuilder) {
        return root.__watchlistQueryBuilder;
      }
      const api = createApi(root, options);
      root.__watchlistQueryBuilder = api;
      return api;
    }
  };
})(window, document, window.jQuery);
</script>
