{% set builder_variant = builder_variant|default('page') %}
{% set watchlist_input_placeholder = watchlist_input_placeholder|default('Watchlist name') %}
<div class="watchlist-query-builder {% if builder_variant == 'modal' %}modal-layout{% endif %}" data-watchlist-query-builder data-variant="{{ builder_variant }}">
    <div data-role="builder"></div>
    <div class="d-flex flex-wrap align-items-center justify-content-between mb-3">
        <button type="button" data-role="preview-btn" class="btn btn-primary">Generate SQL</button>
        {% if builder_variant == 'modal' %}
        <a href="{{ url_for('visual_query.visual_query') }}" class="btn btn-outline-secondary btn-sm mt-2 mt-sm-0">Open Full Page</a>
        {% endif %}
    </div>
    <pre data-role="output" class="border rounded bg-light p-3"></pre>

    <div class="input-group" style="max-width:480px; margin-top:8px;">
        <input type="text" data-role="name-input" class="form-control" placeholder="{{ watchlist_input_placeholder }}" maxlength="128">
        <span class="input-group-btn">
            <button type="button" data-role="save-btn" class="btn btn-success" disabled title="Run Generate SQL first">Save Query</button>
        </span>
    </div>
    <div data-role="results"></div>
</div>
