{% block extra_head %}

    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script> -->
    <style>
        /* body { font-family: Arial, sans-serif; margin: 20px; } */
        #builder { margin-bottom: 20px; }
        #results { margin-top: 20px; }

{% endblock %}

<pre id="output"></pre>

// ---- BUTTON ACTION ----

$('#btn-get').on('click', function() {
  try {
    const result = $('#builder').queryBuilder('getSQL', false, false);	
    $('#output').text(result.sql || 'No query generated');
	
	$.ajax({
		url: '/api/preview-query',
		type: 'POST',                   // HTTP method
		data: JSON.stringify(result.sql),
    headers: { 
        'Content-Type': 'application/json',
        'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
    },
		contentType: 'application/json; charset=utf-8',
		dataType: 'json',
		success: function (response) {
			console.log("Success:", response);
			if(!Array.isArray(response) || response.length === 0)
				$('#results').text("No results found.");
			else {
				let html = '<table><thead><tr>';
				Object.keys(response[0]).forEach(key => html += `<th>${key}</th>`);
				html += '</tr></thead><tbody>';
				response.forEach(row => {
					html += '<tr>';
					Object.values(row).forEach(val => html += `<td>${val}</td>`);
					html += '</tr>';
				});
				html += '</tbody></table>';
				$('#results').html(html);
			}			
		},
		error: function (xhr, status, error) {
			console.error("Error:", status, error);
			console.error("Response:", xhr.responseText);
			
		}
	});
  } catch (e) {
    $('#output').text('Error: ' + e.message);
  }
});

  try {
    const rules = $('#builder').queryBuilder('getRules');
