{% extends "site.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4">
        <h3 class="mb-4">Sign Up</h3>

        <div class="card">
            <div class="card-body">

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="alert alert-danger">
                    {{ messages[0] }}.
                    Go to <a href="{{ url_for('auth.login') }}" class="alert-link">login page</a>.
                </div>
                {% endif %}
                {% endwith %}

                <form method="POST" action="/signup">
                    <div class="form-group">
                        <input class="form-control form-control-lg" type="email" name="email" placeholder="Email"
                            autofocus>
                    </div>
                    <div class="form-group">
                        <input class="form-control form-control-lg" type="text" name="name" placeholder="Name">
                    </div>
                    <div class="form-group">
                        <input class="form-control form-control-lg" type="password" name="password"
                            placeholder="Password">
                    </div>
                    <button type="submit" class="btn btn-info btn-lg btn-block">
                        Sign Up
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
