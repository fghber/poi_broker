name: Post coverage comment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  post_coverage_comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Post coverage comment
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
